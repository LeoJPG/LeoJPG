name: Update profile activity cards

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-activity-cards
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v6

      - name: Generate activity card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&hide_border=true&rank_icon=github&bg_color=0d1117&title_color=ff4fd8&text_color=c9d1d9&icon_color=39ffb6
          path: profile/stats.svg
          token: ${{ secrets.PROFILE_STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate language card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&size_weight=0.5&count_weight=0.5&hide_border=true&bg_color=0d1117&title_color=ff4fd8&text_color=c9d1d9
          path: profile/top-langs.svg
          token: ${{ secrets.PROFILE_STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Amend profile snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          if git diff --cached --quiet; then exit 0; fi
          git commit --amend --no-edit
          git push --force-with-lease origin HEAD:main
